##################################################################################################
#
# Bookinfo for OpenShift Service Mesh 3.1
#
# Registry: bastion.mylab.paas.local:5000/bookinfo/
#
# 배포 순서:
#   1) oc new-project bookinfo
#   2) oc label namespace bookinfo istio-injection=enabled
#   3) oc apply -f bookinfo-ossm31.yaml -n bookinfo
#
# 확인:
#   oc get pods -n bookinfo
#   oc get gateway,virtualservice,destinationrule -n bookinfo
#
# 접속:
#   GATEWAY_URL=$(oc get route bookinfo-gateway -n bookinfo -o jsonpath='{.spec.host}')
#   curl http://$GATEWAY_URL/productpage
#
##################################################################################################
## ==============================
## 1. Application - Details
## ==============================
apiVersion: v1
kind: Service
metadata:
  name: details
  labels:
    app: details
    service: details
spec:
  ports:
  - port: 9080
    name: http
  selector:
    app: details
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bookinfo-details
  labels:
    account: details
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: details-v1
  labels:
    app: details
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: details
      version: v1
  template:
    metadata:
      labels:
        app: details
        version: v1
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      serviceAccountName: bookinfo-details
      containers:
      - name: details
        image: bastion.mylab.paas.local:5000/bookinfo/examples-bookinfo-details-v1:1.20.2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9080
---
